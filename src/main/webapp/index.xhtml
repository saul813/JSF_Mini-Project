<!DOCTYPE html>
<html xmlns="http://w3.org"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>Enterprise Portal Home</title>
    <!-- JSF Resource Expression Engine handles the location lookups safely -->
    <h:outputStylesheet library="css" name="style.css" />
</h:head>
<h:body>

    <div class="card">
        <h1>Welcome to the Support Center</h1>
        <p style="color: #666; margin-bottom: 30px;">
            We appreciate your insight. Click below to register your system feedback.
        </p>

        <h:form>
            <!-- IMPLICIT NAVIGATION: Target page filename goes directly into the outcome attribute -->
            <h:button value="Go to Feedback Form" outcome="feedback" styleClass="btn-primary" />
        </h:form>
    </div>

</h:body>
</html>
