<!DOCTYPE html>
<html xmlns="http://w3.org"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Enterprise Feedback System</title>
</h:head>
<h:body style="background-color: #f4f7f6; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">

    <!-- PrimeFaces Card Component Container -->
    <p:card style="width: 450px; padding: 10px;">
        <f:facet name="title">
            Enterprise Feedback Portal
        </f:facet>
        <f:facet name="subtitle">
            We value your insights and application performance telemetry
        </f:facet>

        <h:form id="feedbackForm">
            <!-- Global messaging panel for instant error alert blocks -->
            <p:messages id="messages" closable="true">
                <p:autoUpdate />
            </p:messages>

            <!-- Name Input Field Row Setup -->
            <div style="margin-bottom: 15px;">
                <p:outputLabel for="name" value="Your Name" style="display:block; margin-bottom:5px; font-weight:bold;" />

                <!-- Notice: No self-closing slash at the end of this open line -->
                <p:inputText id="name" value="#{feedbackBean.customerName}" required="true" style="width:100%">
                    <!-- These live strictly inside the inputText component -->
                    <f:validateLength minimum="3" maximum="30" />
                    <p:ajax event="blur" update="messages" />
                </p:inputText> <!-- Completely closed here -->
            </div>

            <!-- Comments Input Field Row Setup -->
            <div style="margin-bottom: 20px;">
                <p:outputLabel for="comments" value="Comments" style="display:block; margin-bottom:5px; font-weight:bold;" />

                <!-- Notice: No self-closing slash at the end of this open line -->
                <p:inputTextarea id="comments" value="#{feedbackBean.comments}" rows="4" style="width:100%"
                                 counter="display" maxlength="150" counterTemplate="{0} characters remaining.">
                    <!-- This lives strictly inside the inputTextarea component -->
                    <f:validator validatorId="noSpamValidator" />
                </p:inputTextarea> <!-- Completely closed here -->

                <h:outputText id="display" style="font-size:12px; color:#666;" />
            </div>

            <!-- Action Command Buttons -->
            <div style="display: flex; gap: 10px; justify-content: flex-start;">
                <p:commandButton value="Submit Feedback"
                                 action="#{feedbackBean.processFeedback()}"
                                 process="@form"
                                 update="responsePanel"
                                 icon="pi pi-check" />

                <p:button value="Back Home"
                          outcome="index"
                          icon="pi pi-home"
                          styleClass="ui-button-secondary" />
            </div>
        </h:form>

        <!-- Response Display Panel Group -->
        <h:panelGroup id="responsePanel">
            <h:panelGroup rendered="#{not empty feedbackBean.responseMessage}">
                <p:staticMessage severity="info" summary="SUCCESS" detail="#{feedbackBean.responseMessage}" style="width: 100%; margin-top: 20px;"/>
            </h:panelGroup>
        </h:panelGroup>
    </p:card>

</h:body>
</html>
